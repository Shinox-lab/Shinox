worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # ── Logging ──────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Defaults ─────────────────────────────────────────────
    sendfile           on;
    keepalive_timeout  65;
    client_max_body_size 50m;

    # ── SSL settings ─────────────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Rate limiting ────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;

    # ── Upstream definitions ─────────────────────────────────
    upstream dashboard_backend {
        server dashboard:3000;
    }
    upstream grafana_backend {
        server grafana:3000;
    }
    upstream console_backend {
        server redpanda-console:8080;
    }
    upstream api_backend {
        server api-gateway:8002;
    }

    # ==========================================================
    # HTTP → HTTPS redirect + ACME challenge
    # ==========================================================
    server {
        listen 80;
        server_name dashboard.aidebate.site grafana.aidebate.site console.aidebate.site api.aidebate.site;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ==========================================================
    # dashboard.aidebate.site
    # ==========================================================
    server {
        listen 443 ssl;
        server_name dashboard.aidebate.site;

        ssl_certificate     /etc/letsencrypt/live/aidebate.site/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/aidebate.site/privkey.pem;

        limit_req zone=general burst=20 nodelay;

        location / {
            proxy_pass http://dashboard_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support (Next.js HMR / live updates)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # ==========================================================
    # grafana.aidebate.site
    # ==========================================================
    server {
        listen 443 ssl;
        server_name grafana.aidebate.site;

        ssl_certificate     /etc/letsencrypt/live/aidebate.site/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/aidebate.site/privkey.pem;

        limit_req zone=general burst=20 nodelay;

        location / {
            proxy_pass http://grafana_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support (Grafana live)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # ==========================================================
    # console.aidebate.site (Redpanda Console)
    # ==========================================================
    server {
        listen 443 ssl;
        server_name console.aidebate.site;

        ssl_certificate     /etc/letsencrypt/live/aidebate.site/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/aidebate.site/privkey.pem;

        limit_req zone=general burst=20 nodelay;

        location / {
            proxy_pass http://console_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ==========================================================
    # api.aidebate.site
    # ==========================================================
    server {
        listen 443 ssl;
        server_name api.aidebate.site;

        ssl_certificate     /etc/letsencrypt/live/aidebate.site/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/aidebate.site/privkey.pem;

        limit_req zone=general burst=50 nodelay;

        location / {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support (if API uses SSE/WS)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}

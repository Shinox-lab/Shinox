name: Production Deployment (Docker Swarm)

on:
  push:
    branches: [ main ] # Only deploy when code is pushed to main
  workflow_dispatch:
    inputs:
      skip_build:
        description: 'Skip build steps (use existing images)'
        required: false
        type: boolean
        default: false
      image_tag:
        description: 'Image tag to deploy (commit SHA). Required when skipping build.'
        required: false
        type: string

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    # Permission needed to read the repo and write to the GitHub Container Registry (GHCR)
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Compute lowercase repo name (GHCR requires all-lowercase image names)
      - name: Set lowercase repo name
        run: echo "REPO_LC=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # Set up Docker Buildx for layer caching support
      - name: Set up Docker Buildx
        if: ${{ github.event.inputs.skip_build != 'true' }}
        uses: docker/setup-buildx-action@v3

      # ==========================================
      # BUILD AND PUSH ALL SERVICES
      # Each image is tagged with the Git Commit SHA for traceability
      # Uses GitHub Actions cache for Docker layers to speed up rebuilds
      # ==========================================

      - name: Build and Push agent-registry
        if: ${{ github.event.inputs.skip_build != 'true' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.agent-registry
          push: true
          provenance: false
          tags: ${{ env.REPO_LC }}/agent-registry:${{ github.sha }}
          cache-from: type=gha,scope=agent-registry
          cache-to: type=gha,mode=max,scope=agent-registry

      - name: Build and Push squad-lead-agent
        if: ${{ github.event.inputs.skip_build != 'true' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.squad-lead-agent
          push: true
          provenance: false
          tags: ${{ env.REPO_LC }}/squad-lead-agent:${{ github.sha }}
          cache-from: type=gha,scope=squad-lead-agent
          cache-to: type=gha,mode=max,scope=squad-lead-agent

      - name: Build and Push governance
        if: ${{ github.event.inputs.skip_build != 'true' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.governance
          push: true
          provenance: false
          tags: ${{ env.REPO_LC }}/governance:${{ github.sha }}
          cache-from: type=gha,scope=governance
          cache-to: type=gha,mode=max,scope=governance

      - name: Build and Push director
        if: ${{ github.event.inputs.skip_build != 'true' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.director
          push: true
          provenance: false
          tags: ${{ env.REPO_LC }}/director:${{ github.sha }}
          cache-from: type=gha,scope=director
          cache-to: type=gha,mode=max,scope=director

      - name: Build and Push kafka2db
        if: ${{ github.event.inputs.skip_build != 'true' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.kafka2db
          push: true
          provenance: false
          tags: ${{ env.REPO_LC }}/kafka2db:${{ github.sha }}
          cache-from: type=gha,scope=kafka2db
          cache-to: type=gha,mode=max,scope=kafka2db

      # - name: Build and Push accounting-agent
      #   if: ${{ github.event.inputs.skip_build != 'true' }}
      #   uses: docker/build-push-action@v5
      #   with:
      #     context: .
      #     file: infra/Dockerfile.accounting-agent
      #     push: true
      #     provenance: false
      #     tags: ${{ env.REPO_LC }}/accounting-agent:${{ github.sha }}
      #     cache-from: type=gha,scope=accounting-agent
      #     cache-to: type=gha,mode=max,scope=accounting-agent

      - name: Build and Push general-fast-agent
        if: ${{ github.event.inputs.skip_build != 'true' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.general-fast-agent
          push: true
          provenance: false
          tags: ${{ env.REPO_LC }}/general-fast-agent:${{ github.sha }}
          cache-from: type=gha,scope=general-fast-agent
          cache-to: type=gha,mode=max,scope=general-fast-agent

      - name: Build and Push philosopher-agent
        if: ${{ github.event.inputs.skip_build != 'true' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.philosopher-agent
          push: true
          provenance: false
          tags: ${{ env.REPO_LC }}/philosopher-agent:${{ github.sha }}
          cache-from: type=gha,scope=philosopher-agent
          cache-to: type=gha,mode=max,scope=philosopher-agent

      - name: Build and Push todo-list-agent
        if: ${{ github.event.inputs.skip_build != 'true' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.todo-list-agent
          push: true
          provenance: false
          tags: ${{ env.REPO_LC }}/todo-list-agent:${{ github.sha }}
          cache-from: type=gha,scope=todo-list-agent
          cache-to: type=gha,mode=max,scope=todo-list-agent

      - name: Build and Push api-gateway
        if: ${{ github.event.inputs.skip_build != 'true' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.api-gateway
          push: true
          provenance: false
          tags: ${{ env.REPO_LC }}/api-gateway:${{ github.sha }}
          cache-from: type=gha,scope=api-gateway
          cache-to: type=gha,mode=max,scope=api-gateway

      - name: Build and Push dashboard
        if: ${{ github.event.inputs.skip_build != 'true' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.dashboard
          push: true
          provenance: false
          tags: ${{ env.REPO_LC }}/dashboard:${{ github.sha }}
          cache-from: type=gha,scope=dashboard
          cache-to: type=gha,mode=max,scope=dashboard

      - name: Build and Push nginx
        if: ${{ github.event.inputs.skip_build != 'true' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.nginx
          push: true
          provenance: false
          tags: ${{ env.REPO_LC }}/nginx:${{ github.sha }}
          cache-from: type=gha,scope=nginx
          cache-to: type=gha,mode=max,scope=nginx

      # ==========================================
      # DEPLOY TO DOCKER SWARM VIA SSH
      # envsubst injects IMAGE_TAG and REPO into compose.yaml
      # before streaming it to the remote host via SSH
      # ==========================================
      - name: Deploy to Docker Swarm
        env:
          IMAGE_TAG: ${{ github.event.inputs.image_tag || github.sha }}
          REPO: ${{ env.REPO_LC }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # 0. Trim whitespace from IMAGE_TAG
          IMAGE_TAG="$(echo -n "$IMAGE_TAG" | xargs)"
          export IMAGE_TAG

          # 1. Install envsubst
          sudo apt-get install -y gettext-base

          # 2. Setup SSH Key
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

          # 3. Debug: verify variables
          echo "IMAGE_TAG=[$IMAGE_TAG] REPO=[$REPO]"

          # 4. Process compose.yaml with envsubst and package with config files
          #    Docker Swarm configs need the referenced files available relative to compose.yaml
          DEPLOY_DIR=$(mktemp -d)
          envsubst '$IMAGE_TAG $REPO $OPENAI_API_KEY' < infra/compose.yaml > "$DEPLOY_DIR/compose.yaml"
          cp -r infra/monitoring "$DEPLOY_DIR/monitoring"
          cp -r infra/schemas "$DEPLOY_DIR/schemas"
          tar czf /tmp/deploy.tar.gz -C "$DEPLOY_DIR" .

          # 5. Send deployment package and deploy via SSH
          scp /tmp/deploy.tar.gz ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/deploy.tar.gz
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "\
            mkdir -p /tmp/shinox-deploy && \
            tar xzf /tmp/deploy.tar.gz -C /tmp/shinox-deploy && \
            echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u ${{ github.actor }} --password-stdin && \
            docker version --format '{{.Server.Version}}' && \
            cd /tmp/shinox-deploy && \
            docker stack deploy --with-registry-auth -c compose.yaml shinox && \
            rm -rf /tmp/shinox-deploy /tmp/deploy.tar.gz"

      # ==========================================
      # PROVISION REAL CERTS (first deploy only)
      # Checks if real LE certs exist; if not, requests them.
      # On subsequent deploys this is a no-op.
      # ==========================================
      - name: Provision Let's Encrypt certificates
        env:
          CERTBOT_EMAIL: ${{ secrets.CERTBOT_EMAIL }}
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} bash -s << 'REMOTE_SCRIPT'
            set -e
            DOMAINS="dashboard.aidebate.site grafana.aidebate.site console.aidebate.site api.aidebate.site"
            CERTBOT_EMAIL="${CERTBOT_EMAIL:-admin@aidebate.site}"

            # Wait for nginx to be running
            echo "Waiting for nginx to start..."
            for i in $(seq 1 30); do
              if docker ps --format '{{.Names}}' | grep -q 'shinox_nginx'; then
                echo "Nginx is running."
                break
              fi
              echo "  attempt $i/30..."
              sleep 5
            done

            # Check if valid certs already exist inside the volume
            HAS_CERTS=$(docker run --rm \
              -v shinox_certbot_conf:/etc/letsencrypt \
              certbot/certbot:latest certificates 2>/dev/null | grep -c "Certificate Name" || true)

            if [ "$HAS_CERTS" -gt 0 ]; then
              echo "Valid Let's Encrypt certificates already exist. Skipping provisioning."
              exit 0
            fi

            echo "No valid certificates found. Requesting from Let's Encrypt..."

            # Build domain args
            DOMAIN_ARGS=""
            for d in $DOMAINS; do
              DOMAIN_ARGS="$DOMAIN_ARGS -d $d"
            done

            # Run certbot via a one-shot container sharing the same volumes
            # --keep-until-expiring avoids re-issuing if certs are still valid
            docker run --rm \
              -v shinox_certbot_conf:/etc/letsencrypt \
              -v shinox_certbot_www:/var/www/certbot \
              certbot/certbot:latest certonly \
                --webroot \
                --webroot-path=/var/www/certbot \
                --email "$CERTBOT_EMAIL" \
                --agree-tos \
                --no-eff-email \
                --keep-until-expiring \
                $DOMAIN_ARGS

            echo "Certificates obtained. Reloading Nginx..."

            # Find the nginx container and reload
            NGINX_CONTAINER=$(docker ps --format '{{.Names}}' | grep 'shinox_nginx' | head -1)
            if [ -n "$NGINX_CONTAINER" ]; then
              docker exec "$NGINX_CONTAINER" nginx -s reload
              echo "Nginx reloaded with real certificates."
            fi

            echo "Done! HTTPS is live for: $DOMAINS"
          REMOTE_SCRIPT
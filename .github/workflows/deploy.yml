name: Production Deployment (Docker Swarm)

on:
  push:
    branches: [ main ] # Only deploy when code is pushed to main
  workflow_dispatch:
    inputs:
      skip_build:
        description: 'Skip build steps (use existing images)'
        required: false
        type: boolean
        default: false
      image_tag:
        description: 'Image tag to deploy (commit SHA). Required when skipping build.'
        required: false
        type: string

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    # Permission needed to read the repo and write to the GitHub Container Registry (GHCR)
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Compute lowercase repo name (GHCR requires all-lowercase image names)
      - name: Set lowercase repo name
        run: echo "REPO_LC=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # ==========================================
      # BUILD AND PUSH ALL SERVICES
      # Each image is tagged with the Git Commit SHA for traceability
      # ==========================================

      - name: Build and Push agent-registry
        if: ${{ github.event.inputs.skip_build != 'true' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.agent-registry
          push: true
          tags: ${{ env.REPO_LC }}/agent-registry:${{ github.sha }}

      - name: Build and Push squad-lead-agent
        if: ${{ github.event.inputs.skip_build != 'true' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.squad-lead-agent
          push: true
          tags: ${{ env.REPO_LC }}/squad-lead-agent:${{ github.sha }}

      - name: Build and Push governance
        if: ${{ github.event.inputs.skip_build != 'true' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.governance
          push: true
          tags: ${{ env.REPO_LC }}/governance:${{ github.sha }}

      - name: Build and Push director
        if: ${{ github.event.inputs.skip_build != 'true' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.director
          push: true
          tags: ${{ env.REPO_LC }}/director:${{ github.sha }}

      - name: Build and Push kafka2db
        if: ${{ github.event.inputs.skip_build != 'true' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.kafka2db
          push: true
          tags: ${{ env.REPO_LC }}/kafka2db:${{ github.sha }}

      - name: Build and Push accounting-agent
        if: ${{ github.event.inputs.skip_build != 'true' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.accounting-agent
          push: true
          tags: ${{ env.REPO_LC }}/accounting-agent:${{ github.sha }}

      - name: Build and Push general-fast-agent
        if: ${{ github.event.inputs.skip_build != 'true' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.general-fast-agent
          push: true
          tags: ${{ env.REPO_LC }}/general-fast-agent:${{ github.sha }}

      - name: Build and Push philosopher-agent
        if: ${{ github.event.inputs.skip_build != 'true' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.philosopher-agent
          push: true
          tags: ${{ env.REPO_LC }}/philosopher-agent:${{ github.sha }}

      - name: Build and Push todo-list-agent
        if: ${{ github.event.inputs.skip_build != 'true' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.todo-list-agent
          push: true
          tags: ${{ env.REPO_LC }}/todo-list-agent:${{ github.sha }}

      - name: Build and Push api-gateway
        if: ${{ github.event.inputs.skip_build != 'true' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.api-gateway
          push: true
          tags: ${{ env.REPO_LC }}/api-gateway:${{ github.sha }}

      - name: Build and Push dashboard
        if: ${{ github.event.inputs.skip_build != 'true' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.dashboard
          push: true
          tags: ${{ env.REPO_LC }}/dashboard:${{ github.sha }}

      # ==========================================
      # DEPLOY TO DOCKER SWARM VIA SSH
      # envsubst injects IMAGE_TAG and REPO into compose.yaml
      # before streaming it to the remote host via SSH
      # ==========================================
      - name: Deploy to Docker Swarm
        env:
          IMAGE_TAG: ${{ github.event.inputs.image_tag || github.sha }}
          REPO: ${{ env.REPO_LC }}
        run: |
          # 1. Install envsubst
          sudo apt-get install -y gettext-base

          # 2. Setup SSH Key
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

          # 3. Debug: show envsubst output and remote Docker version
          echo "=== Processed compose.yaml (first 5 lines) ==="
          envsubst '$IMAGE_TAG $REPO' < infra/compose.yaml | head -5
          echo "=== Line 179 of processed compose.yaml ==="
          envsubst '$IMAGE_TAG $REPO' < infra/compose.yaml | sed -n '176,182p'

          # 4. Inject REPO and IMAGE_TAG into compose.yaml, then deploy via SSH
          envsubst '$IMAGE_TAG $REPO' < infra/compose.yaml | ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
          "cat > /tmp/compose.yaml && \
           echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u ${{ github.actor }} --password-stdin && \
           docker version --format '{{.Server.Version}}' && \
           docker stack deploy --with-registry-auth -c /tmp/compose.yaml shinox"